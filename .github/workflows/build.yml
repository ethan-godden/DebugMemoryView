name: Build

# Builds the plug-in and runs the headless JUnit 5 suites on every push/PR, and uploads the
# zipped p2 update site as an artifact. That zip is how the plug-in ships: users install it
# into an existing Eclipse via Help > Install New Software > Add > Archive.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tycho 5.0.3 must itself run on Java 21; this sets JAVA_HOME for the pre-installed
      # Maven and caches ~/.m2 (the p2 target is large on the first run).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: maven

      - name: Build + test (Maven + Tycho)
        run: mvn -f parent clean verify -B

      # The zipped p2 site — download it from the run and hand it off for an offline
      # install via Help > Install New Software > Add > Archive (no hosting needed).
      - name: Upload update-site zip
        uses: actions/upload-artifact@v4
        with:
          name: update-site-zip
          path: repository/target/repository-*.zip
          if-no-files-found: error
