name: Build & publish update site

# Builds the plug-in and runs the headless JUnit 5 suites on every push/PR. On main it
# publishes the p2 update site to GitHub Pages, so the plug-in installs into an existing
# Eclipse via Help > Install New Software.
# One-time repo setup: Settings > Pages > Source = "GitHub Actions".
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tycho 5.0.3 must itself run on Java 21; this sets JAVA_HOME for the pre-installed
      # Maven and caches ~/.m2 (the p2 target is large on the first run).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: maven

      - name: Build + test (Maven + Tycho)
        run: mvn -f parent clean verify -B

      # The zipped p2 site — download it from the run and hand it off for an offline
      # install via Help > Install New Software > Add > Archive (no hosting needed).
      - name: Upload update-site zip
        uses: actions/upload-artifact@v4
        with:
          name: update-site-zip
          path: repository/target/repository-*.zip
          if-no-files-found: error

      # The p2 repo is the Pages site root; only needed for the main-branch deploy below.
      - name: Package update site for Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: repository/target/repository

  # Publishes the p2 update site to https://<owner>.github.io/<repo>/ so it can be pasted
  # into Help > Install New Software. Needs Settings > Pages > Source = "GitHub Actions".
  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
